<script type="text/babel">
const { useState, useMemo, useCallback, useEffect, useRef } = React;

const GAS_URL = "https://script.google.com/macros/s/AKfycbyhiWZpMQu46ZLZ-oyQJbdidXvc-0Y-f0bLmP7cWoX-lIPnFca0Cf5cIT0vTGSnKyMV/exec";
const GAS_TOKEN = "els2024stock";
const GEMINI_KEY = "AIzaSyAJY8tlODQ4EfQdB_rDucgajS9w15Z2bPs";
const GEMINI_URL = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent?key=${GEMINI_KEY}`;
const WATCH_KEY = "stock_watchlist_v1";
const STORAGE_KEY = "stock_journal_local_v1";
const PRICES_KEY = "stock_prices_cache_v1";
const AUTO_REFRESH_MS = 60 * 1000;

// ── Gemini AI ─────────────────────────────────────────────────────
async function geminiAsk(prompt) {
  const res = await fetch(GEMINI_URL, {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({
      contents: [{ parts: [{ text: prompt }] }],
      generationConfig: { temperature: 0.3, maxOutputTokens: 1200 }
    })
  });
  const data = await res.json();
  return data.candidates?.[0]?.content?.parts?.[0]?.text || "";
}

// ── Trading hours (Taiwan UTC+8, Mon-Fri 09:00-13:30) ────────────
function isTradingHours() {
  const tw = new Date(Date.now() + 8*60*60*1000);
  const day = tw.getUTCDay(), h = tw.getUTCHours(), m = tw.getUTCMinutes();
  return day>=1&&day<=5&&(h*60+m)>=540&&(h*60+m)<810;
}
function getTWTime() {
  const tw = new Date(Date.now() + 8*60*60*1000);
  const h=String(tw.getUTCHours()).padStart(2,"0"), mi=String(tw.getUTCMinutes()).padStart(2,"0");
  return `週${"日一二三四五六"[tw.getUTCDay()]} ${h}:${mi}`;
}

// ── JSONP for GAS ─────────────────────────────────────────────────
function jsonp(url) {
  return new Promise((resolve, reject) => {
    const cb = "__gas_" + Date.now() + "_" + Math.random().toString(36).slice(2);
    const script = document.createElement("script");
    const timer = setTimeout(() => { cleanup(); reject(new Error("timeout")); }, 20000);
    function cleanup() { clearTimeout(timer); delete window[cb]; script.parentNode?.removeChild(script); }
    window[cb] = data => { cleanup(); resolve(data); };
    script.src = url + (url.includes("?")?"&":"?") + "callback=" + cb;
    script.onerror = () => { cleanup(); reject(new Error("load error")); };
    document.head.appendChild(script);
  });
}
async function gasGet() {
  const data = await jsonp(`${GAS_URL}?action=get&token=${GAS_TOKEN}`);
  if (!data.ok) throw new Error(data.msg||"failed");
  return (data.trades||[]).map(parseTrade);
}
async function gasWrite(action, payload) {
  const encoded = encodeURIComponent(JSON.stringify(payload));
  return await jsonp(`${GAS_URL}?action=${action}&token=${GAS_TOKEN}&data=${encoded}`);
}

function parseDate(val) {
  if (!val) return null;
  if (typeof val==="string") {
    if (/^\d{4}-\d{2}-\d{2}$/.test(val)) return val;
    if (val.includes("T")) { const d=new Date(val); return new Date(d.getTime()+8*3600000).toISOString().slice(0,10); }
    return val;
  }
  if (val instanceof Date) return new Date(val.getTime()+8*3600000).toISOString().slice(0,10);
  return String(val);
}
function parseTrade(t) {
  return { ...t, id:Number(t.id), shares:Number(t.shares), buyPrice:Number(t.buyPrice),
    sellPrice:t.sellPrice?Number(t.sellPrice):null, buyDate:parseDate(t.buyDate),
    sellDate:t.sellDate?parseDate(t.sellDate):null, feeRate:Number(t.feeRate)||0.6,
    isEtf:t.isEtf===true||t.isEtf==="true"||t.isEtf==="TRUE" };
}

// ── Local storage ─────────────────────────────────────────────────
function loadLocal() { try{const r=localStorage.getItem(STORAGE_KEY);if(r)return JSON.parse(r);}catch{}return null; }
function saveLocal(t) { try{localStorage.setItem(STORAGE_KEY,JSON.stringify(t));}catch{} }
function loadPriceCache() { try{const r=localStorage.getItem(PRICES_KEY);if(r)return JSON.parse(r);}catch{}return {}; }
function savePriceCache(p) { try{localStorage.setItem(PRICES_KEY,JSON.stringify(p));}catch{} }
function loadWatchlist() { try{const r=localStorage.getItem(WATCH_KEY);if(r)return JSON.parse(r);}catch{}return [{id:101,stock:"台積電",ticker:"2330.TW",note:""},{id:102,stock:"聯發科",ticker:"2454.TW",note:""}]; }
function saveWatchlist(w) { try{localStorage.setItem(WATCH_KEY,JSON.stringify(w));}catch{} }

const initialTrades = [
  {id:1,stock:"力成",ticker:"6239.TW",shares:300,buyDate:"2024-01-15",buyPrice:222,sellDate:null,sellPrice:null,status:"holding",feeRate:0.6,isEtf:false},
  {id:2,stock:"華邦電",ticker:"4958.TW",shares:100,buyDate:"2024-03-10",buyPrice:95,sellDate:null,sellPrice:null,status:"holding",feeRate:0.6,isEtf:false},
  {id:3,stock:"藥華藥",ticker:"6446.TW",shares:100,buyDate:"2024-02-20",buyPrice:707,sellDate:null,sellPrice:null,status:"holding",feeRate:0.6,isEtf:false},
  {id:4,stock:"0050",ticker:"0050.TW",shares:1500,buyDate:"2023-06-01",buyPrice:95.18,sellDate:null,sellPrice:null,status:"holding",feeRate:0.6,isEtf:true},
  {id:5,stock:"00646",ticker:"00646.TW",shares:1000,buyDate:"2023-09-15",buyPrice:72.2,sellDate:null,sellPrice:null,status:"holding",feeRate:0.6,isEtf:true},
];

// ── Calc ──────────────────────────────────────────────────────────
const BR = 0.001425;
function calcFees(price,shares,isBuy,isEtf,disc=0.6){return{broker:Math.max(20,Math.round(price*shares*BR*disc)),tax:isBuy?0:Math.round(price*shares*(isEtf?0.001:0.003))};}
function calcPnl(trade,sp=null){
  sp=sp??trade.sellPrice;if(!sp)return null;
  const sf=calcFees(sp,trade.shares,false,trade.isEtf,trade.feeRate),bf=calcFees(trade.buyPrice,trade.shares,true,trade.isEtf,trade.feeRate);
  const gross=(sp-trade.buyPrice)*trade.shares;
  return{gross,net:gross-bf.broker-sf.broker-sf.tax,buyFee:bf,sellFee:sf};
}
const fmt=n=>n==null?"—":Number(n).toLocaleString("zh-TW",{minimumFractionDigits:0,maximumFractionDigits:2});
const fmtS=n=>(n>=0?"+":"")+fmt(n);
const pc=n=>n>0?"pos":n<0?"neg":"zero";
const fmtTime=d=>d?new Date(d).toLocaleTimeString("zh-TW",{hour:"2-digit",minute:"2-digit"}):"";

// ── Yahoo Finance price fetch ─────────────────────────────────────
const fetchWithTimeout=(url,ms=25000)=>new Promise((resolve,reject)=>{
  const timer=setTimeout(()=>reject(new Error("timeout")),ms);
  fetch(url).then(r=>{clearTimeout(timer);resolve(r);}).catch(e=>{clearTimeout(timer);reject(e);});
});

async function fetchYahooPrice(ticker) {
  const base = ticker.toUpperCase().replace(/\.(TW|TWO)$/i,"");
  const candidates = ticker.toUpperCase().endsWith(".TWO")?[base+".TWO",base+".TW"]:[base+".TW",base+".TWO"];
  const tryTicker = async(t)=>{
    const urls=[`https://query2.finance.yahoo.com/v8/finance/chart/${t}?interval=1d&range=2d`,
                `https://query1.finance.yahoo.com/v8/finance/chart/${t}?interval=1d&range=2d`];
    for(const yurl of urls){
      for(const proxy of[`https://api.allorigins.win/get?url=${encodeURIComponent(yurl)}`,`https://corsproxy.io/?${encodeURIComponent(yurl)}`]){
        try{
          const res=await fetchWithTimeout(proxy);if(!res.ok)continue;
          const data=await res.json();
          const raw=data.contents!==undefined?data.contents:JSON.stringify(data);
          const parsed=JSON.parse(raw);
          const meta=parsed?.chart?.result?.[0]?.meta;
          if(meta?.regularMarketPrice)return meta;
        }catch{continue;}
      }
    }
    return null;
  };
  let meta=null;
  for(const t of candidates){meta=await tryTicker(t);if(meta)break;}
  if(!meta?.regularMarketPrice)throw new Error("no price");
  const price=meta.regularMarketPrice,prev=meta.previousClose||meta.chartPreviousClose;
  const change=prev?parseFloat((price-prev).toFixed(2)):0;
  const changePercent=prev?parseFloat(((price-prev)/prev*100).toFixed(2)):0;
  return{price,change,changePercent,updatedAt:Date.now()};
}

// ── K-line fetch via Gemini ───────────────────────────────────────
async function fetchKline(ticker, stockName, period="1m") {
  const periodLabel={"1m":"1個月","3m":"3個月","6m":"6個月","1y":"1年"}[period]||"1個月";
  const exampleJson = '{"candles":[{"date":"2025-01-02","open":100,"high":105,"low":99,"close":103,"volume":1234567}],"currentPrice":103,"change":1.5,"changePercent":1.47}';
  const prompt = "請提供台灣股票 " + ticker + "（" + stockName + "）最近" + periodLabel + "的每日K線資料。只回傳純JSON不加任何說明或markdown：\n" + exampleJson + "\n至少20個交易日，日期YYYY-MM-DD格式。";
  const text = await geminiAsk(prompt);
  const allBraces=(text.match(/\{[\s\S]*\}/g)||[]).sort((a,b)=>b.length-a.length);
  for(const s of allBraces){try{const r=JSON.parse(s);if(r.candles?.length>0)return r;}catch{}}
  throw new Error("no kline data");
}

// ── KChart ────────────────────────────────────────────────────────
function KChart({candles,buyPrice,supports=[],resistances=[]}) {
  const [tip,setTip]=useState(null);
  if(!candles?.length)return <div style={{color:"#333",textAlign:"center",padding:30,fontSize:13}}>無K線資料</div>;
  const W=580,H=220,P={t:12,r:20,b:28,l:52};
  const pw=W-P.l-P.r,ph=H-P.t-P.b;
  const cw=Math.max(3,Math.floor(pw/candles.length)-2);
  const all=candles.flatMap(c=>[c.high,c.low]);
  if(buyPrice)all.push(buyPrice);
  [...supports,...resistances].forEach(v=>all.push(v));
  const mn=Math.min(...all)*0.994,mx=Math.max(...all)*1.006;
  const yS=v=>P.t+(1-(v-mn)/(mx-mn))*ph;
  const xOf=i=>P.l+(i+0.5)*(pw/candles.length);
  const grids=Array.from({length:5},(_,i)=>mn+(mx-mn)*i/4);
  const skip=Math.ceil(candles.length/6);
  return(
    <div style={{position:"relative",overflowX:"auto"}}>
      <svg viewBox={`0 0 ${W} ${H}`} style={{width:"100%",maxWidth:W,display:"block"}} onMouseLeave={()=>setTip(null)}>
        {grids.map((v,i)=><g key={i}><line x1={P.l} x2={W-P.r} y1={yS(v)} y2={yS(v)} stroke="#1a1b22" strokeWidth={1}/><text x={P.l-4} y={yS(v)+4} fill="#3a3a44" fontSize={9} textAnchor="end">{fmt(v)}</text></g>)}
        {supports.map((s,i)=><g key={`s${i}`}><line x1={P.l} x2={W-P.r} y1={yS(s)} y2={yS(s)} stroke="#6dcc80" strokeWidth={1} strokeDasharray="4 3" opacity={0.6}/><text x={W-P.r+2} y={yS(s)+4} fill="#6dcc80" fontSize={8}>撐</text></g>)}
        {resistances.map((r,i)=><g key={`r${i}`}><line x1={P.l} x2={W-P.r} y1={yS(r)} y2={yS(r)} stroke="#e06060" strokeWidth={1} strokeDasharray="4 3" opacity={0.6}/><text x={W-P.r+2} y={yS(r)+4} fill="#e06060" fontSize={8}>壓</text></g>)}
        {buyPrice&&<><line x1={P.l} x2={W-P.r} y1={yS(buyPrice)} y2={yS(buyPrice)} stroke="#c9a227" strokeWidth={1} strokeDasharray="3 2" opacity={0.8}/><text x={W-P.r+2} y={yS(buyPrice)+4} fill="#c9a227" fontSize={8}>成本</text></>}
        {candles.map((c,i)=>{
          const x=xOf(i),up=c.close>=c.open,col=up?"#6dcc80":"#e06060";
          const bt=yS(Math.max(c.open,c.close)),bh=Math.max(1,yS(Math.min(c.open,c.close))-bt);
          return <g key={i} onMouseMove={()=>setTip({...c,x})} style={{cursor:"crosshair"}}><line x1={x} x2={x} y1={yS(c.high)} y2={yS(c.low)} stroke={col} strokeWidth={1}/><rect x={x-cw/2} y={bt} width={cw} height={bh} fill={col} opacity={0.88} rx={0.5}/></g>;
        })}
        {candles.map((c,i)=>i%skip===0?<text key={i} x={xOf(i)} y={H-P.b+12} fill="#3a3a44" fontSize={8} textAnchor="middle">{c.date?.slice(5)}</text>:null)}
        {tip&&<line x1={tip.x} x2={tip.x} y1={P.t} y2={H-P.b} stroke="#555" strokeWidth={1} strokeDasharray="2 2"/>}
      </svg>
      {tip&&<div style={{position:"absolute",top:4,left:56,background:"#0c0d10",border:"1px solid #2a2a35",borderRadius:3,padding:"5px 10px",fontSize:10,color:"#e8e6de",pointerEvents:"none",fontFamily:"DM Mono,monospace",zIndex:10}}>
        <div style={{color:"#666",marginBottom:2}}>{tip.date}</div>
        <div>開{fmt(tip.open)} 高<span style={{color:"#6dcc80"}}>{fmt(tip.high)}</span></div>
        <div>低<span style={{color:"#e06060"}}>{fmt(tip.low)}</span> 收{fmt(tip.close)}</div>
      </div>}
    </div>
  );
}

// ── AI Analysis hook ──────────────────────────────────────────────
function useAI(ticker,stockName,candles,period){
  const [analysis,setAnalysis]=useState(null);
  const [loading,setLoading]=useState(false);
  const [supports,setSupports]=useState([]);
  const [resistances,setResistances]=useState([]);
  const prevKey=useRef("");
  const run=useCallback(async()=>{
    if(!candles||candles.length<5)return;
    setLoading(true);setAnalysis(null);
    try{
      const summary=candles.slice(-30).map(c=>`${c.date} O:${c.open} H:${c.high} L:${c.low} C:${c.close} V:${c.volume||0}`).join("\n");
      const fmt2='{"trend":"上升|下降|盤整","trendDesc":"說明","supports":[價1,價2],"resistances":[價1,價2],"buyerStrength":"強|中|弱","sellerStrength":"強|中|弱","keyPatterns":["型態"],"volumeAnalysis":"說明","summary":"分析3-4句","signal":"偏多|偏空|中性","riskNote":"風險"}';
      const text=await geminiAsk("你是台股技術分析師，根據以下 "+stockName+"("+ticker+") 最近"+period+"的日K線，用繁體中文分析。\n\n"+summary+"\n\n只回傳純JSON不加markdown："+fmt2);
      const allBraces=(text.match(/\{[\s\S]*\}/g)||[]).sort((a,b)=>b.length-a.length);
      for(const s of allBraces){try{const p=JSON.parse(s);if(p.signal){setAnalysis(p);setSupports(p.supports||[]);setResistances(p.resistances||[]);break;}}}
    }catch{setAnalysis({summary:"分析失敗。",signal:"中性"});}
    setLoading(false);
  },[candles,ticker,period]);
  useEffect(()=>{
    const key=`${ticker}-${period}-${candles?.length}`;
    if(key!==prevKey.current&&candles?.length>4){prevKey.current=key;run();}
  },[candles,ticker,period]);
  return{analysis,loading,supports,resistances,run};
}

function AIBlock({ai}){
  const{analysis,loading,supports,resistances,run}=ai;
  const sigCol={"偏多":"#6dcc80","偏空":"#e06060","中性":"#c9a227"};
  const strCol={"強":"#6dcc80","中":"#c9a227","弱":"#e06060"};
  return(
    <div style={{background:"#0e0f14",border:"1px solid #1e2030",borderRadius:4,padding:"16px 18px",marginTop:14}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12}}>
        <div style={{fontSize:11,color:"#666",letterSpacing:".08em"}}>▸ AI 技術分析 (Gemini)</div>
        {!loading&&<button onClick={run} style={{background:"none",border:"1px solid #2a2a35",color:"#777",borderRadius:2,padding:"3px 10px",fontSize:11,cursor:"pointer",fontFamily:"inherit"}}>重新分析</button>}
      </div>
      {loading&&<div style={{display:"flex",alignItems:"center",gap:10,color:"#666",fontSize:13,padding:"12px 0"}}><span className="spin" style={{fontSize:16}}>↻</span>AI 分析中…</div>}
      {analysis&&!loading&&(
        <div style={{display:"flex",flexDirection:"column",gap:12}}>
          <div style={{display:"flex",gap:8,flexWrap:"wrap"}}>
            <span style={{background:(sigCol[analysis.signal]||"#888")+"22",color:sigCol[analysis.signal]||"#888",border:`1px solid ${(sigCol[analysis.signal]||"#888")}44`,borderRadius:3,padding:"4px 12px",fontSize:13,fontWeight:700}}>{analysis.signal}</span>
            {analysis.trend&&<span style={{background:"#1a1b22",color:"#999",borderRadius:3,padding:"4px 10px",fontSize:12,border:"1px solid #2a2a35"}}>趨勢：{analysis.trend}</span>}
          </div>
          {analysis.trendDesc&&<div style={{fontSize:13,color:"#c0beb8",lineHeight:1.7}}>{analysis.trendDesc}</div>}
          {(analysis.buyerStrength||analysis.sellerStrength)&&<div style={{display:"flex",gap:20}}>
            <div style={{fontSize:12}}>買方力道 <span style={{color:strCol[analysis.buyerStrength],fontWeight:700,fontFamily:"DM Mono"}}>{analysis.buyerStrength}</span></div>
            <div style={{fontSize:12}}>賣方力道 <span style={{color:strCol[analysis.sellerStrength],fontWeight:700,fontFamily:"DM Mono"}}>{analysis.sellerStrength}</span></div>
          </div>}
          {(supports.length>0||resistances.length>0)&&<div style={{display:"flex",gap:16,flexWrap:"wrap"}}>
            {supports.length>0&&<div style={{fontSize:12}}><span style={{color:"#666"}}>支撐：</span>{supports.map((s,i)=><span key={i} style={{color:"#6dcc80",fontFamily:"DM Mono",marginRight:8}}>{fmt(s)}</span>)}</div>}
            {resistances.length>0&&<div style={{fontSize:12}}><span style={{color:"#666"}}>壓力：</span>{resistances.map((r,i)=><span key={i} style={{color:"#e06060",fontFamily:"DM Mono",marginRight:8}}>{fmt(r)}</span>)}</div>}
          </div>}
          {analysis.keyPatterns?.length>0&&<div style={{display:"flex",gap:6,flexWrap:"wrap"}}>{analysis.keyPatterns.map((p,i)=><span key={i} style={{background:"#1a1b22",color:"#c9a227",border:"1px solid #2a2a2a",borderRadius:2,padding:"2px 8px",fontSize:11}}>{p}</span>)}</div>}
          {analysis.volumeAnalysis&&<div style={{fontSize:12,color:"#777"}}>📊 {analysis.volumeAnalysis}</div>}
          <div style={{fontSize:13,color:"#e8e6de",lineHeight:1.8,borderTop:"1px solid #1a1b22",paddingTop:10}}>{analysis.summary}</div>
          {analysis.riskNote&&<div style={{fontSize:11,color:"#666",borderTop:"1px solid #1a1b22",paddingTop:8}}>⚠️ {analysis.riskNote}</div>}
        </div>
      )}
    </div>
  );
}

// ── Entry Radar ───────────────────────────────────────────────────
function EntryRadarTab({watchlist}){
  const [results,setResults]=useState([]);
  const [loading,setLoading]=useState(false);
  const [progress,setProgress]=useState("");
  const [scanned,setScanned]=useState(false);
  const lvlColor={"強力買入":"#6dcc80","考慮買入":"#8acc6a","觀察":"#c9a227","暫不介入":"#e06060"};
  const lvlBg={"強力買入":"#1a2a1a","考慮買入":"#1e2a1a","觀察":"#1e1a0a","暫不介入":"#2a1a1a"};

  const scan=async()=>{
    if(!watchlist.length)return;
    setLoading(true);setResults([]);setScanned(false);
    const out=[];
    for(let i=0;i<watchlist.length;i++){
      const w=watchlist[i];
      setProgress(`分析中 ${w.stock} (${i+1}/${watchlist.length})…`);
      try{
        const kline=await fetchKline(w.ticker,w.stock,"1m");
        const candles=kline.candles||[];
        if(candles.length<5){out.push({...w,error:"K線資料不足",score:0});continue;}
        const closes=candles.map(c=>c.close);
        const ma=(arr,n)=>arr.length>=n?arr.slice(-n).reduce((a,b)=>a+b,0)/n:null;
        const ma5=ma(closes,5),ma10=ma(closes,10),ma20=ma(closes,20);
        const last=candles[candles.length-1];
        const gains=[],losses=[];
        for(let j=1;j<Math.min(15,candles.length);j++){const d=candles[j].close-candles[j-1].close;gains.push(d>0?d:0);losses.push(d<0?-d:0);}
        const avgG=gains.reduce((a,b)=>a+b,0)/gains.length,avgL=losses.reduce((a,b)=>a+b,0)/losses.length;
        const rsi=avgL===0?100:100-(100/(1+avgG/avgL));
        const recentVol=candles.slice(-3).reduce((a,c)=>a+c.volume,0)/3;
        const priorVol=candles.slice(-6,-3).reduce((a,c)=>a+c.volume,0)/3;
        const volRatio=priorVol>0?recentVol/priorVol:1;
        const bodyLow=Math.min(last.open,last.close);
        const shadowPct=last.high-last.low>0?(bodyLow-last.low)/(last.high-last.low):0;
        const summary=candles.slice(-10).map(c=>`${c.date} O:${c.open} H:${c.high} L:${c.low} C:${c.close} V:${c.volume||0}`).join("\n");
        const entryFmt='{"score":75,"level":"強力買入|考慮買入|觀察|暫不介入","reasons":["理由1","理由2"],"supports":[支撐價1,支撐價2],"resistances":[壓力價1],"entryPrice":建議進場價,"stopLoss":建議停損價,"summary":"一句話總結"}';
        const entryPrompt="台股技術分析師，分析 "+w.stock+"("+w.ticker+") 近期K線判斷進場時機。\n近10日K線：\n"+summary+"\nMA5:"+(ma5?.toFixed(1)||"N/A")+", MA10:"+(ma10?.toFixed(1)||"N/A")+", MA20:"+(ma20?.toFixed(1)||"N/A")+"\nRSI:"+rsi.toFixed(1)+", 量比:"+volRatio.toFixed(2)+", 下影線:"+(shadowPct*100).toFixed(1)+"%\n只回傳純JSON不加markdown："+entryFmt;
        const aiText=await geminiAsk(entryPrompt);
        const allBraces=(aiText.match(/\{[\s\S]*\}/g)||[]).sort((a,b)=>b.length-a.length);
        let ai={score:50,level:"觀察",reasons:[],supports:[],resistances:[],summary:""};
        for(const s of allBraces){try{const p=JSON.parse(s);if(p.level){ai=p;break;}}catch{}}
        out.push({...w,candles,currentPrice:kline.currentPrice,change:kline.change,changePercent:kline.changePercent,ma5,ma10,ma20,rsi,volRatio,shadowPct,score:Math.min(100,Math.max(0,Number(ai.score)||50)),level:ai.level||"觀察",reasons:ai.reasons||[],supports:ai.supports||[],resistances:ai.resistances||[],entryPrice:ai.entryPrice,stopLoss:ai.stopLoss,aiSummary:ai.summary||"",error:null});
      }catch(e){out.push({...w,error:"分析失敗",score:0});}
    }
    out.sort((a,b)=>b.score-a.score);
    setResults(out);setLoading(false);setScanned(true);setProgress("");
  };

  return(
    <div>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16,flexWrap:"wrap",gap:10}}>
        <div><div style={{fontWeight:700,fontSize:15}}>進場雷達</div><div style={{fontSize:12,color:"#666",marginTop:2}}>追蹤清單 {watchlist.length} 檔股票分析進場時機</div></div>
        <button className="btn-gold" onClick={scan} disabled={loading||!watchlist.length}>{loading?<><span className="spin">↻</span> {progress}</>:"▶ 開始掃描"}</button>
      </div>
      {!scanned&&!loading&&<div className="card" style={{padding:48,textAlign:"center",color:"#444"}}><div style={{fontSize:32,marginBottom:12}}>📡</div><div style={{fontSize:13}}>點擊「開始掃描」分析追蹤清單進場時機</div></div>}
      {loading&&<div className="card" style={{padding:48,textAlign:"center"}}><div className="spin" style={{fontSize:32,display:"inline-block",marginBottom:12,color:"#c9a227"}}>↻</div><div style={{fontSize:13,color:"#777"}}>{progress}</div><div style={{marginTop:16,background:"#1a1b22",borderRadius:3,height:4,overflow:"hidden"}}><div style={{height:"100%",background:"#c9a227",width:(results.length/Math.max(watchlist.length,1)*100)+"%",transition:"width .5s",borderRadius:3}}/></div></div>}
      {scanned&&!loading&&<div style={{display:"flex",flexDirection:"column",gap:12}}>
        {results.map((r,idx)=>(
          <div key={r.id} className="card" style={{padding:"16px 18px",borderLeft:`3px solid ${lvlColor[r.level]||"#333"}`}}>
            {r.error?<div style={{display:"flex",justifyContent:"space-between"}}><span style={{fontWeight:700}}>{r.stock}</span><span style={{fontSize:12,color:"#e06060"}}>{r.error}</span></div>:(
              <div>
                <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:12,flexWrap:"wrap",gap:8}}>
                  <div style={{display:"flex",alignItems:"center",gap:10,flexWrap:"wrap"}}>
                    <span style={{fontSize:13,color:"#555",fontFamily:"DM Mono"}}>#{idx+1}</span>
                    <span style={{fontWeight:700,fontSize:16}}>{r.stock}</span>
                    <span style={{fontSize:11,color:"#555",fontFamily:"DM Mono"}}>{r.ticker}</span>
                    <span className="badge" style={{background:lvlBg[r.level]||"#1a1b22",color:lvlColor[r.level]||"#888",border:`1px solid ${(lvlColor[r.level]||"#888")}44`}}>{r.level}</span>
                  </div>
                  <div style={{textAlign:"right"}}><div style={{fontFamily:"DM Mono",fontSize:18,fontWeight:700}}>{fmt(r.currentPrice)}</div>{r.changePercent!=null&&<div className={`mono ${pc(r.changePercent)}`} style={{fontSize:12}}>{r.changePercent>=0?"+":""}{fmt(r.changePercent)}%</div>}</div>
                </div>
                <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:12}}>
                  <span style={{fontSize:11,color:"#666",width:48,flexShrink:0}}>進場分</span>
                  <div className="score-bar" style={{flex:1}}><div className="score-fill" style={{width:r.score+"%",background:r.score>=70?"#6dcc80":r.score>=50?"#c9a227":"#e06060"}}/></div>
                  <span style={{fontFamily:"DM Mono",fontSize:13,fontWeight:700,color:r.score>=70?"#6dcc80":r.score>=50?"#c9a227":"#e06060",width:36,textAlign:"right"}}>{r.score}</span>
                </div>
                <div style={{display:"flex",gap:12,marginBottom:10,flexWrap:"wrap"}}>
                  {[["MA5",r.ma5],["MA10",r.ma10],["MA20",r.ma20]].map(([l,v])=>v&&<div key={l} style={{fontSize:11}}><span style={{color:"#666"}}>{l} </span><span className="mono" style={{color:r.currentPrice&&r.currentPrice<=v*1.02?"#6dcc80":"#e8e6de"}}>{fmt(v)}</span></div>)}
                  <div style={{fontSize:11}}><span style={{color:"#666"}}>RSI </span><span className="mono" style={{color:r.rsi<30?"#6dcc80":r.rsi>70?"#e06060":"#e8e6de"}}>{r.rsi?.toFixed(1)}</span>{r.rsi<30&&<span style={{fontSize:10,color:"#6dcc80",marginLeft:3}}>超賣</span>}</div>
                  <div style={{fontSize:11}}><span style={{color:"#666"}}>量比 </span><span className="mono" style={{color:r.volRatio>1.5?"#6dcc80":"#e8e6de"}}>{r.volRatio?.toFixed(2)}</span></div>
                  {r.shadowPct>0.3&&<div style={{fontSize:11,color:"#6dcc80"}}>🪝 下影線 {(r.shadowPct*100).toFixed(0)}%</div>}
                </div>
                {(r.supports?.length>0||r.resistances?.length>0)&&<div style={{display:"flex",gap:16,marginBottom:8,flexWrap:"wrap"}}>
                  {r.supports?.length>0&&<div style={{fontSize:12}}><span style={{color:"#666"}}>支撐 </span>{r.supports.map((s,i)=><span key={i} style={{color:"#6dcc80",fontFamily:"DM Mono",marginRight:6}}>{fmt(s)}</span>)}</div>}
                  {r.resistances?.length>0&&<div style={{fontSize:12}}><span style={{color:"#666"}}>壓力 </span>{r.resistances.map((v,i)=><span key={i} style={{color:"#e06060",fontFamily:"DM Mono",marginRight:6}}>{fmt(v)}</span>)}</div>}
                </div>}
                {(r.entryPrice||r.stopLoss)&&<div style={{display:"flex",gap:16,marginBottom:8}}>
                  {r.entryPrice&&<div style={{fontSize:12}}><span style={{color:"#666"}}>建議進場 </span><span style={{color:"#c9a227",fontFamily:"DM Mono",fontWeight:700}}>{fmt(r.entryPrice)}</span></div>}
                  {r.stopLoss&&<div style={{fontSize:12}}><span style={{color:"#666"}}>停損 </span><span style={{color:"#e06060",fontFamily:"DM Mono"}}>{fmt(r.stopLoss)}</span></div>}
                </div>}
                {r.reasons?.length>0&&<div style={{display:"flex",flexWrap:"wrap",gap:6,marginBottom:8}}>{r.reasons.map((reason,i)=><span key={i} style={{background:"#1a1b22",color:"#b0aead",border:"1px solid #2a2a35",borderRadius:2,padding:"2px 8px",fontSize:11}}>✓ {reason}</span>)}</div>}
                {r.aiSummary&&<div style={{fontSize:12,color:"#888",borderTop:"1px solid #1a1b22",paddingTop:8}}>{r.aiSummary}</div>}
                {r.candles?.length>0&&<div style={{marginTop:12,borderTop:"1px solid #1a1b22",paddingTop:12}}><KChart candles={r.candles.slice(-20)} supports={r.supports} resistances={r.resistances}/></div>}
              </div>
            )}
          </div>
        ))}
      </div>}
    </div>
  );
}

// ── Exit Alert ────────────────────────────────────────────────────
function ExitAlertTab({trades}){
  const [results,setResults]=useState([]);
  const [loading,setLoading]=useState(false);
  const [progress,setProgress]=useState("");
  const [scanned,setScanned]=useState(false);
  const holding=trades.filter(t=>t.status==="holding"&&t.ticker);
  const actColor={"立即出場":"#e06060","考慮減碼":"#e07030","設停利":"#c9a227","續抱觀察":"#6dcc80"};
  const actBg={"立即出場":"#2a1a1a","考慮減碼":"#2a1e14","設停利":"#1e1a0a","續抱觀察":"#1a2a1a"};

  const scan=async()=>{
    if(!holding.length)return;
    setLoading(true);setResults([]);setScanned(false);
    const out=[];
    for(let i=0;i<holding.length;i++){
      const t=holding[i];
      setProgress(`評估中 ${t.stock} (${i+1}/${holding.length})…`);
      try{
        const kline=await fetchKline(t.ticker,t.stock,"1m");
        const candles=kline.candles||[];
        if(candles.length<5){out.push({...t,error:"K線資料不足",risk:0});continue;}
        const last=candles[candles.length-1],prev=candles[candles.length-2],prev2=candles.length>=3?candles[candles.length-3]:null;
        const surge1=prev2?(prev.close-prev2.close)/prev2.close*100:0;
        const surge2=(last.close-prev.close)/prev.close*100;
        const avgVol=candles.slice(-6,-1).reduce((a,c)=>a+c.volume,0)/5;
        const volSpike=avgVol>0?last.volume/avgVol:1;
        const bodyHigh=Math.max(last.open,last.close);
        const upperShadowPct=last.high-last.low>0?(last.high-bodyHigh)/(last.high-last.low):0;
        const curPrice=kline.currentPrice||last.close;
        const pnl=calcPnl(t,curPrice);
        const returnPct=(curPrice-t.buyPrice)/t.buyPrice*100;
        const gains=[],losses=[];
        for(let j=1;j<Math.min(15,candles.length);j++){const d=candles[j].close-candles[j-1].close;gains.push(d>0?d:0);losses.push(d<0?-d:0);}
        const avgG=gains.reduce((a,b)=>a+b,0)/gains.length,avgL=losses.reduce((a,b)=>a+b,0)/losses.length;
        const rsi=avgL===0?100:100-(100/(1+avgG/avgL));
        const summary=candles.slice(-10).map(c=>`${c.date} O:${c.open} H:${c.high} L:${c.low} C:${c.close} V:${c.volume||0}`).join("\n");
        const exitFmt='{"risk":80,"action":"立即出場|考慮減碼|設停利|續抱觀察","warnings":["警示1","警示2"],"targetPrice":建議出場價或null,"summary":"一句話總結"}';
        const exitPrompt="台股技術分析師，評估 "+t.stock+"("+t.ticker+") 是否應該出場。\n近10日K線：\n"+summary+"\n買入成本:"+t.buyPrice+", 目前:"+curPrice+", 報酬率:"+returnPct.toFixed(1)+"%\nRSI:"+rsi.toFixed(1)+", 量比:"+volSpike.toFixed(2)+", 上影線:"+(upperShadowPct*100).toFixed(1)+"%\n近兩日漲幅: 前日"+surge1.toFixed(1)+"%、今日"+surge2.toFixed(1)+"%\n只回傳純JSON不加markdown："+exitFmt;
        const aiText=await geminiAsk(exitPrompt);
        const allBraces=(aiText.match(/\{[\s\S]*\}/g)||[]).sort((a,b)=>b.length-a.length);
        let ai={risk:30,action:"續抱觀察",warnings:[],summary:""};
        for(const s of allBraces){try{const p=JSON.parse(s);if(p.action){ai=p;break;}}catch{}}
        out.push({...t,candles,currentPrice:curPrice,returnPct,pnl,rsi,volSpike,upperShadowPct,consecutiveSurge:surge1>5&&surge2>5,bigSurge:surge2>10,surge1,surge2,risk:Math.min(100,Math.max(0,Number(ai.risk)||30)),action:ai.action||"續抱觀察",warnings:ai.warnings||[],targetPrice:ai.targetPrice,aiSummary:ai.summary||"",error:null});
      }catch(e){out.push({...t,error:"分析失敗",risk:0});}
    }
    out.sort((a,b)=>b.risk-a.risk);
    setResults(out);setLoading(false);setScanned(true);setProgress("");
  };

  return(
    <div>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16,flexWrap:"wrap",gap:10}}>
        <div><div style={{fontWeight:700,fontSize:15}}>出場警示</div><div style={{fontSize:12,color:"#666",marginTop:2}}>評估 {holding.length} 檔持倉出場風險</div></div>

                  </div>
                  <div style={{textAlign:"right"}}><div style={{fontFamily:"DM Mono",fontSize:16,fontWeight:700}}>{fmt(r.currentPrice)}</div><div className={`mono ${pc(r.returnPct)}`} style={{fontSize:12}}>{r.returnPct>=0?"+":""}{r.returnPct?.toFixed(2)}%</div></div>
                </div>
                <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:12}}>
                  <span style={{fontSize:11,color:"#666",width:48,flexShrink:0}}>出場風險</span>
                  <div className="score-bar" style={{flex:1}}><div className="score-fill" style={{width:r.risk+"%",background:r.risk>=70?"#e06060":r.risk>=50?"#c9a227":"#6dcc80"}}/></div>

                </div>
                <div style={{display:"flex",gap:16,marginBottom:10,flexWrap:"wrap"}}>
                  <div style={{fontSize:12}}><span style={{color:"#666"}}>成本 </span><span className="mono">{fmt(r.buyPrice)}</span></div>
                  {r.pnl&&<div style={{fontSize:12}}><span style={{color:"#666"}}>淨損益 </span><span className={`mono ${pc(r.pnl.net)}`} style={{fontWeight:700}}>{fmtS(r.pnl.net)}</span></div>}
                  <div style={{fontSize:12}}><span style={{color:"#666"}}>RSI </span><span className="mono" style={{color:r.rsi>70?"#e06060":r.rsi<30?"#6dcc80":"#e8e6de"}}>{r.rsi?.toFixed(1)}</span>{r.rsi>70&&<span style={{fontSize:10,color:"#e06060",marginLeft:3}}>超買</span>}</div>

                  {r.bigSurge&&!r.consecutiveSurge&&<div style={{fontSize:11,color:"#e07030"}}>⬆ 今日暴漲 {r.surge2?.toFixed(1)}%</div>}
                  {r.upperShadowPct>0.4&&<div style={{fontSize:11,color:"#e06060"}}>☁ 上影線 {(r.upperShadowPct*100).toFixed(0)}%</div>}

                {r.warnings?.length>0&&<div style={{display:"flex",flexWrap:"wrap",gap:6,marginBottom:8}}>{r.warnings.map((w,i)=><span key={i} style={{background:"#2a1a1a",color:"#e07030",border:"1px solid #4a2a1a",borderRadius:2,padding:"2px 8px",fontSize:11}}>⚠ {w}</span>)}</div>}

  );

// ── Grouped Holding Table ─────────────────────────────────────────
function HoldingTable({holding,prices,loadingPrices,expandedGroups,setExpandedGroups,setDetail,setDetailIsTrade,setSellModal,setSellForm,deleteTrade}){
  const groups=useMemo(()=>{const map={};holding.forEach(t=>{const k=t.ticker||t.stock;if(!map[k])map[k]=[];map[k].push(t);});return Object.values(map);},[holding]);
  const toggle=key=>setExpandedGroups(prev=>({...prev,[key]:!prev[key]}));
  return(
    <div className="card" style={{overflowX:"auto"}}>
      <table style={{width:"100%",borderCollapse:"collapse"}}>
        <thead><tr><th>股票</th><th>總股數</th><th>均價</th><th>現價</th><th>今日漲跌</th><th>更新時間</th><th>毛損益</th><th>淨損益</th><th></th></tr></thead>
        <tbody>
          {holding.length===0&&<tr><td colSpan={9} style={{color:"#333",textAlign:"center",padding:36}}>暫無持倉</td></tr>}
          {groups.map(group=>{
            const key=group[0].ticker||group[0].stock;
            const isExpanded=expandedGroups[key],isMulti=group.length>1;
            const p=prices[key];
            const isStale=p?.updatedAt&&(Date.now()-p.updatedAt)>5*60*1000;
            const totalShares=group.reduce((s,t)=>s+t.shares,0);
            const avgPrice=group.reduce((s,t)=>s+t.buyPrice*t.shares,0)/totalShares;
            const aggTrade={...group[0],shares:totalShares,buyPrice:avgPrice};
            const pnl=p?calcPnl(aggTrade,p.price):null;
            return(
              <React.Fragment key={key}>
                <tr className="group-row" onClick={()=>{if(isMulti)toggle(key);else{setDetail(group[0]);setDetailIsTrade(true);}}}>
                  <td><div style={{display:"flex",alignItems:"center",gap:6}}>
                    {isMulti&&<span className="expand-btn" onClick={e=>{e.stopPropagation();toggle(key);}}>{isExpanded?"▼":"▶"}</span>}
                    <div><div className="sn">{group[0].stock}</div><div style={{fontSize:10,color:"#555",fontFamily:"DM Mono"}}>{key}{isMulti&&<span style={{color:"#c9a227",marginLeft:6}}>{group.length}批</span>}</div></div>
                  </div></td>
                  <td className="mono" style={{fontWeight:600}}>{fmt(totalShares)}</td>
                  <td className="mono" style={{color:isMulti?"#c9a227":"#e8e6de"}}>{fmt(avgPrice)}{isMulti&&<span style={{fontSize:9,color:"#777",marginLeft:3}}>均</span>}</td>
                  <td>{loadingPrices&&!p?<span className="spin" style={{color:"#555"}}>↻</span>:p?<span className="mono" style={{color:isStale?"#666":"#e8e6de"}}>{fmt(p.price)}</span>:<span style={{color:"#333"}}>—</span>}</td>
                  <td>{p?.change!=null?<span className={`mono ${pc(p.change)}`}>{fmtS(p.change)}</span>:<span style={{color:"#333"}}>—</span>}</td>
                  <td style={{fontSize:10,color:"#4a4a5a",fontFamily:"DM Mono"}}>{p?.updatedAt?fmtTime(p.updatedAt):"—"}</td>
                  <td className={`mono ${pnl?pc(pnl.gross):""}`}>{pnl?fmtS(pnl.gross):"—"}</td>
                  <td className={`mono ${pnl?pc(pnl.net):""}`} style={{fontWeight:700}}>{pnl?fmtS(pnl.net):"—"}</td>
                  <td onClick={e=>e.stopPropagation()} style={{display:"flex",gap:5,alignItems:"center"}}>
                    {!isMulti?<button className="btn-sm" onClick={e=>{e.stopPropagation();setSellModal(group[0]);setSellForm({date:new Date().toISOString().slice(0,10),price:p?.price?.toString()||"",shares:String(group[0].shares)});}}>賣出</button>
                      :<span style={{fontSize:11,color:"#555",whiteSpace:"nowrap"}}>▶ 展開</span>}
                  </td>
                </tr>
                {isMulti&&isExpanded&&group.map((t,idx)=>{
                  const bpnl=p?calcPnl(t,p.price):null;
                  return(
                    <tr key={t.id} className="sub-row">
                      <td style={{paddingLeft:34}}><div style={{color:"#c0beb8",fontWeight:600}}>第 {idx+1} 批</div><div style={{fontSize:10,color:"#555"}}>買入 {t.buyDate}</div></td>
                      <td className="mono">{fmt(t.shares)}</td>
                      <td className="mono">{fmt(t.buyPrice)}</td>
                      <td className="mono" style={{color:"#777"}}>{p?fmt(p.price):"—"}</td>
                      <td style={{color:"#444"}}>—</td><td style={{color:"#444"}}>—</td>
                      <td className={`mono ${bpnl?pc(bpnl.gross):""}`}>{bpnl?fmtS(bpnl.gross):"—"}</td>
                      <td className={`mono ${bpnl?pc(bpnl.net):""}`} style={{fontWeight:600}}>{bpnl?fmtS(bpnl.net):"—"}</td>
                      <td onClick={e=>e.stopPropagation()} style={{display:"flex",gap:4}}>
                        <button className="btn-sm" style={{fontSize:11,padding:"3px 8px"}} onClick={e=>{e.stopPropagation();setDetail(t);setDetailIsTrade(true);}}>K線</button>
                        <button className="btn-sm" style={{fontSize:11,padding:"3px 8px"}} onClick={e=>{e.stopPropagation();setSellModal(t);setSellForm({date:new Date().toISOString().slice(0,10),price:p?.price?.toString()||"",shares:String(t.shares)});}}>賣出</button>
                        <button className="btn-del" onClick={e=>{e.stopPropagation();deleteTrade(t.id);}}>×</button>
                      </td>
                    </tr>
                  );
                })}
              </React.Fragment>
            );
          })}
        </tbody>
      </table>
    </div>
  );
}

// ── Main App ──────────────────────────────────────────────────────
const TABS=["持倉","已平倉","新增","追蹤","月統計","進場雷達","出場警示"];

function App(){
  const [trades,setTrades]=useState([]);
  const [watchlist,setWatchlist]=useState(loadWatchlist);
  const [tab,setTab]=useState(0);
  const [detail,setDetail]=useState(null);
  const [detailIsTrade,setDetailIsTrade]=useState(true);
  const [sellModal,setSellModal]=useState(null);
  const [sellForm,setSellForm]=useState({date:"",price:"",shares:""});
  const [expandedGroups,setExpandedGroups]=useState({});
  const [form,setForm]=useState({stock:"",ticker:"",shares:"",buyDate:"",buyPrice:"",feeRate:"0.6",isEtf:false});
  const [formError,setFormError]=useState("");
  const [filterMonth,setFilterMonth]=useState("");
  const [prices,setPrices]=useState(()=>loadPriceCache());
  const [loadingPrices,setLoadingPrices]=useState(false);
  const [lastUpdated,setLastUpdated]=useState(null);
  const [autoRefresh,setAutoRefresh]=useState(true);
  const [inTrading,setInTrading]=useState(isTradingHours());
  const [twTime,setTwTime]=useState(getTWTime());
  const [countdown,setCountdown]=useState(AUTO_REFRESH_MS/1000);
  const [syncStatus,setSyncStatus]=useState("loading");
  const [syncMsg,setSyncMsg]=useState("連線中…");
  const timerRef=useRef(null);
  const countdownRef=useRef(null);
  const tradesRef=useRef(trades);

  useEffect(()=>{tradesRef.current=trades;},[trades]);
  useEffect(()=>{const t=setInterval(()=>{setTwTime(getTWTime());setInTrading(isTradingHours());},1000);return()=>clearInterval(t);},[]);

  const updateTrades=next=>{setTrades(next);saveLocal(next);};

  useEffect(()=>{
    gasGet().then(data=>{
      if(data.length>0){updateTrades(data);setSyncStatus("ok");setSyncMsg(`已從 Google Sheets 載入 ${data.length} 筆 ✓`);}
      else{setSyncMsg("寫入初始資料…");Promise.all(initialTrades.map(t=>gasWrite("add",{trade:t}))).then(()=>{updateTrades(initialTrades);setSyncStatus("ok");setSyncMsg("初始資料已寫入 ✓");}).catch(()=>{updateTrades(initialTrades);setSyncStatus("error");setSyncMsg("寫入失敗");});}
    }).catch(()=>{const local=loadLocal();updateTrades(local||initialTrades);setSyncStatus("error");setSyncMsg(local?"GAS 失敗，使用本地快取":"無法連線，使用預設資料");});
  },[]);

  const syncOp=async fn=>{setSyncStatus("loading");setSyncMsg("同步中…");try{await fn();setSyncStatus("ok");setSyncMsg("已同步 ✓");}catch{setSyncStatus("error");setSyncMsg("同步失敗，已儲存本地");}};

  const fetchPricesCore=useCallback(async(tradeList)=>{
    const holding=tradeList.filter(t=>t.status==="holding"&&t.ticker);
    if(!holding.length)return;
    setLoadingPrices(true);
    const results={};
    await Promise.all(holding.map(async t=>{try{const d=await fetchYahooPrice(t.ticker);if(d.price>0)results[t.ticker]=d;}catch{}}));
    if(Object.keys(results).length>0){setPrices(prev=>{const next={...prev,...results};savePriceCache(next);return next;});setLastUpdated(new Date());}
    setLoadingPrices(false);
  },[]);

  const startAutoRefresh=useCallback(()=>{
    if(timerRef.current)clearInterval(timerRef.current);
    if(countdownRef.current)clearInterval(countdownRef.current);
    if(tradesRef.current.length>0&&isTradingHours())fetchPricesCore(tradesRef.current);
    setCountdown(AUTO_REFRESH_MS/1000);
    countdownRef.current=setInterval(()=>{setCountdown(c=>{if(c<=1){if(isTradingHours())fetchPricesCore(tradesRef.current);return AUTO_REFRESH_MS/1000;}return c-1;});},1000);
  },[fetchPricesCore]);

  const stopAutoRefresh=useCallback(()=>{if(timerRef.current){clearInterval(timerRef.current);timerRef.current=null;}if(countdownRef.current){clearInterval(countdownRef.current);countdownRef.current=null;}},[]);

  useEffect(()=>{if(autoRefresh)startAutoRefresh();else stopAutoRefresh();return()=>stopAutoRefresh();},[autoRefresh]);
  useEffect(()=>{if(trades.length>0&&autoRefresh)startAutoRefresh();},[trades.length]);

  const addTrade=async()=>{
    if(!form.stock||!form.shares||!form.buyDate||!form.buyPrice){setFormError("請填寫所有欄位");return;}
    const t={id:Date.now(),stock:form.stock,ticker:form.ticker||"",shares:parseInt(form.shares),buyDate:form.buyDate,buyPrice:parseFloat(form.buyPrice),sellDate:null,sellPrice:null,status:"holding",feeRate:parseFloat(form.feeRate)||0.6,isEtf:form.isEtf};
    updateTrades([...trades,t]);setForm({stock:"",ticker:"",shares:"",buyDate:"",buyPrice:"",feeRate:"0.6",isEtf:false});setFormError("");setTab(0);
    syncOp(()=>gasWrite("add",{trade:t}));
  };

  const confirmSell=async()=>{
    if(!sellForm.date||!sellForm.price||!sellForm.shares)return;
    const sellShares=parseInt(sellForm.shares),remaining=sellModal.shares-sellShares;
    if(remaining<0){alert("賣出股數不能超過持有股數");return;}
    if(remaining===0){
      const updated={...sellModal,sellDate:sellForm.date,sellPrice:parseFloat(sellForm.price),shares:sellShares,status:"sold"};
      updateTrades(trades.map(t=>t.id===sellModal.id?updated:t));
      syncOp(()=>gasWrite("update",{id:updated.id,trade:updated}));
    }else{
      const updatedOriginal={...sellModal,shares:remaining};
      const soldRecord={id:Date.now(),stock:sellModal.stock,ticker:sellModal.ticker,shares:sellShares,buyDate:sellModal.buyDate,buyPrice:sellModal.buyPrice,sellDate:sellForm.date,sellPrice:parseFloat(sellForm.price),status:"sold",feeRate:sellModal.feeRate,isEtf:sellModal.isEtf};
      const next=trades.map(t=>t.id===sellModal.id?updatedOriginal:t);next.push(soldRecord);updateTrades(next);
      syncOp(async()=>{await gasWrite("update",{id:updatedOriginal.id,trade:updatedOriginal});await gasWrite("add",{trade:soldRecord});});
    }
    setSellModal(null);setSellForm({date:"",price:"",shares:""});
  };

  const deleteTrade=async id=>{if(!confirm("確認刪除？"))return;updateTrades(trades.filter(t=>t.id!==id));syncOp(()=>gasWrite("delete",{id}));};

  const holding=trades.filter(t=>t.status==="holding");
  const sold=trades.filter(t=>t.status==="sold");
  const totalUnrealized=holding.reduce((s,t)=>{const p=prices[t.ticker]?.price;return p?s+(calcPnl(t,p)?.net??0):s;},0);
  const totalRealized=sold.reduce((s,t)=>s+(calcPnl(t)?.net??0),0);
  const hasPrices=holding.some(t=>prices[t.ticker]);
  const filteredSold=filterMonth?sold.filter(t=>t.sellDate?.startsWith(filterMonth)):sold;

  const sellPreview=useMemo(()=>{
    if(!sellForm.price||!sellModal||!sellForm.shares)return null;
    return calcPnl({...sellModal,shares:parseInt(sellForm.shares)||sellModal.shares},parseFloat(sellForm.price));
  },[sellForm.price,sellForm.shares,sellModal]);

  const monthlyStats=useMemo(()=>{
    const map={};
    sold.filter(t=>t.sellDate).forEach(t=>{const key=t.sellDate.slice(0,7);if(!map[key])map[key]={net:0,trades:0,wins:0};const r=calcPnl(t);if(!r)return;map[key].net+=r.net;map[key].trades+=1;if(r.net>0)map[key].wins+=1;});
    return Object.entries(map).sort((a,b)=>b[0].localeCompare(a[0]));
  },[trades]);

  const syncColor={loading:"#c9a227",ok:"#6dcc80",error:"#e06060"}[syncStatus]||"#666";

  return(
    <div style={{minHeight:"100vh",background:"#0c0d10",color:"#e8e6de",fontFamily:"'Noto Serif TC',Georgia,serif"}}>
      {detail&&<StockDetail item={detail} isTrade={detailIsTrade} onClose={()=>setDetail(null)} currentPrice={prices[detail.ticker]?.price}/>}

      <div style={{borderBottom:"1px solid #1a1b22",padding:"16px 20px 0"}}>
        <div style={{maxWidth:1080,margin:"0 auto"}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",gap:8,flexWrap:"wrap"}}>
            <div>
              <div style={{display:"flex",alignItems:"center",gap:12,flexWrap:"wrap"}}>
                <span style={{fontSize:20,fontWeight:700,color:"#c9a227"}}>交易日誌</span>
                <span style={{fontSize:11,color:"#555",letterSpacing:".1em"}}>STOCK JOURNAL</span>
                <span style={{display:"flex",alignItems:"center",gap:5,fontSize:11,color:syncColor}}>
                  <span style={{width:6,height:6,borderRadius:"50%",background:syncColor,display:"inline-block",flexShrink:0}}/>
                  {syncMsg}
                </span>
              </div>
              <div style={{display:"flex",gap:16,marginTop:4,fontSize:12,color:"#666",flexWrap:"wrap"}}>
                <span>持倉 <b className="mono" style={{color:"#e8e6de"}}>{holding.length}</b></span>
                <span>追蹤 <b className="mono" style={{color:"#6688cc"}}>{watchlist.length}</b></span>
                <span>未實現淨損益 <b className={`mono ${pc(totalUnrealized)}`}>{hasPrices?fmtS(totalUnrealized):"—"}</b></span>
                <span>已實現淨損益 <b className={`mono ${pc(totalRealized)}`}>{fmtS(totalRealized)}</b></span>
              </div>
            </div>
            <div style={{display:"flex",flexDirection:"column",alignItems:"flex-end",gap:6}}>
              <div style={{display:"flex",alignItems:"center",gap:8}}>
                <button onClick={()=>setAutoRefresh(v=>!v)} style={{background:autoRefresh&&inTrading?"#1a2a1a":"#1a1b22",border:`1px solid ${autoRefresh&&inTrading?"#3a6a3a":"#2a2a35"}`,color:autoRefresh&&inTrading?"#6dcc80":autoRefresh?"#c9a227":"#666",borderRadius:3,padding:"5px 12px",fontFamily:"inherit",fontSize:11,cursor:"pointer",display:"flex",alignItems:"center",gap:5,transition:"all .2s"}}>
                  <span style={{width:6,height:6,borderRadius:"50%",background:autoRefresh&&inTrading?"#6dcc80":autoRefresh?"#c9a227":"#555",display:"inline-block"}}/>
                  {autoRefresh?(inTrading?"交易時段更新中":"非交易時段待機"):"自動更新已停"}
                </button>
                <button className="btn-sm" onClick={()=>fetchPricesCore(trades)} disabled={loadingPrices}>{loadingPrices?<><span className="spin">↻</span> 抓取中</>:"↻ 立即更新"}</button>
              </div>
              <div style={{fontSize:10,color:"#555",textAlign:"right"}}>
                <span style={{color:inTrading?"#3a6a3a":"#3a3a44"}}>台北 {twTime}{inTrading?" 🟢 開盤中":" ⏸ 收盤"}</span>
                {lastUpdated&&<span style={{marginLeft:8}}>最後更新 {fmtTime(lastUpdated)}</span>}
                {autoRefresh&&inTrading&&!loadingPrices&&<span style={{marginLeft:8,color:"#3a3a44"}}>下次更新 {countdown}s</span>}
                {loadingPrices&&<span style={{marginLeft:8,color:"#c9a227"}}>更新中…</span>}
              </div>
            </div>
          </div>
          <div style={{display:"flex",marginTop:12,overflowX:"auto"}}>
            {TABS.map((t,i)=><button key={t} className={`tab-btn${tab===i?" on":""}`} onClick={()=>setTab(i)}>{t}</button>)}
          </div>
        </div>
      </div>

      <div style={{maxWidth:1080,margin:"0 auto",padding:"20px"}}>

        {tab===0&&(syncStatus==="loading"&&trades.length===0
          ?<div style={{textAlign:"center",padding:60,color:"#444"}}><div className="spin" style={{fontSize:28}}>↻</div><div style={{marginTop:12,fontSize:13}}>從 Google Sheets 載入中…</div></div>
          :<HoldingTable holding={holding} prices={prices} loadingPrices={loadingPrices} expandedGroups={expandedGroups} setExpandedGroups={setExpandedGroups} setDetail={setDetail} setDetailIsTrade={setDetailIsTrade} setSellModal={setSellModal} setSellForm={setSellForm} deleteTrade={deleteTrade}/>
        )}

        {tab===1&&(
          <div>
            <div style={{display:"flex",gap:10,marginBottom:14,alignItems:"center"}}>
              <span style={{fontSize:11,color:"#666"}}>篩選月份</span>
              <input type="month" className="inp" style={{width:155}} value={filterMonth} onChange={e=>setFilterMonth(e.target.value)}/>
              {filterMonth&&<button className="btn-sm" onClick={()=>setFilterMonth("")}>× 清除</button>}
            </div>
            <div className="card" style={{overflowX:"auto"}}>
              <table style={{width:"100%",borderCollapse:"collapse"}}>
                <thead><tr><th>股票</th><th>股數</th><th>買入</th><th>賣出</th><th>毛損益</th><th>手續費</th><th>稅</th><th>淨損益</th><th></th></tr></thead>
                <tbody>
                  {filteredSold.length===0&&<tr><td colSpan={9} style={{color:"#333",textAlign:"center",padding:32}}>暫無紀錄</td></tr>}
                  {filteredSold.map(t=>{const r=calcPnl(t);if(!r)return null;return(
                    <tr key={t.id} style={{cursor:"pointer"}} onClick={()=>{setDetail(t);setDetailIsTrade(true);}}>
                      <td><div className="sn">{t.stock}</div><div style={{fontSize:10,color:"#555"}}>{t.buyDate} → {t.sellDate}</div></td>
                      <td className="mono">{fmt(t.shares)}</td><td className="mono">{fmt(t.buyPrice)}</td><td className="mono">{fmt(t.sellPrice)}</td>
                      <td className={`mono ${pc(r.gross)}`}>{fmtS(r.gross)}</td>
                      <td className="mono" style={{color:"#666",fontSize:12}}>-{fmt(r.buyFee.broker+r.sellFee.broker)}</td>
                      <td className="mono" style={{color:"#666",fontSize:12}}>-{fmt(r.sellFee.tax)}</td>
                      <td className={`mono ${pc(r.net)}`} style={{fontWeight:700}}>{fmtS(r.net)}</td>
                      <td onClick={e=>e.stopPropagation()}><button className="btn-del" onClick={()=>deleteTrade(t.id)}>×</button></td>
                    </tr>
                  );})}
                </tbody>
              </table>
            </div>
          </div>
        )}

        {tab===2&&(
          <div style={{maxWidth:440}}>
            <div className="card" style={{padding:22,display:"flex",flexDirection:"column",gap:15}}>
              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:13}}>
                <div><label className="lbl">股票名稱</label><input className="inp" placeholder="力成、0050…" value={form.stock} onChange={e=>setForm({...form,stock:e.target.value})}/></div>
                <div><label className="lbl">代碼（上市.TW / 上櫃.TWO）</label><input className="inp" placeholder="6239.TW" value={form.ticker} onChange={e=>setForm({...form,ticker:e.target.value})}/></div>
              </div>
              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:13}}>
                <div><label className="lbl">股數</label><input className="inp" type="number" placeholder="1000" value={form.shares} onChange={e=>setForm({...form,shares:e.target.value})}/></div>
                <div><label className="lbl">買入日期</label><input className="inp" type="date" value={form.buyDate} onChange={e=>setForm({...form,buyDate:e.target.value})}/></div>
              </div>
              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:13}}>
                <div><label className="lbl">買入價（每股）</label><input className="inp" type="number" step="0.01" placeholder="150.5" value={form.buyPrice} onChange={e=>setForm({...form,buyPrice:e.target.value})}/></div>
                <div><label className="lbl">手續費折扣</label>
                  <select className="inp" value={form.feeRate} onChange={e=>setForm({...form,feeRate:e.target.value})}>
                    <option value="1.0">無折扣</option><option value="0.6">六折</option><option value="0.28">28折</option><option value="0.1">一折</option>
                  </select>
                </div>
              </div>
              <label style={{display:"flex",alignItems:"center",gap:8,cursor:"pointer",fontSize:13,color:"#888"}}>
                <input type="checkbox" checked={form.isEtf} onChange={e=>setForm({...form,isEtf:e.target.checked})} style={{accentColor:"#c9a227"}}/>
                ETF（證交稅 0.1%）
              </label>
              {formError&&<div style={{color:"#e06060",fontSize:12}}>{formError}</div>}
              <button className="btn-gold" onClick={addTrade} style={{alignSelf:"flex-start"}}>新增 →</button>
            </div>
          </div>
        )}

        {tab===3&&<WatchlistTab watchlist={watchlist} setWatchlist={setWatchlist} onDetail={w=>{setDetail(w);setDetailIsTrade(false);}}/>}

        {tab===4&&(
          <div style={{display:"flex",flexDirection:"column",gap:10}}>
            {monthlyStats.length===0?<div className="card" style={{padding:32,color:"#333",textAlign:"center"}}>尚無已平倉紀錄</div>
              :<>
                {monthlyStats.map(([month,stat])=>{
                  const maxAbs=Math.max(...monthlyStats.map(([,s])=>Math.abs(s.net)),1),pct=Math.abs(stat.net)/maxAbs*100;
                  return(<div key={month} className="card" style={{padding:"15px 20px"}}>
                    <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:10}}>
                      <div><div style={{fontWeight:700,fontSize:15}}>{month}</div><div style={{fontSize:11,color:"#666",marginTop:2}}>{stat.trades} 筆 · 勝率 {Math.round(stat.wins/stat.trades*100)}%</div></div>
                      <div style={{textAlign:"right"}}><div className={`mono ${pc(stat.net)}`} style={{fontSize:17,fontWeight:700}}>{fmtS(stat.net)}</div><div style={{fontSize:10,color:"#555"}}>淨損益</div></div>
                    </div>
                    <div style={{background:"#1a1b22",borderRadius:2,height:5,overflow:"hidden"}}><div style={{width:pct+"%",height:"100%",background:stat.net>=0?"#3a7a3a":"#7a3a3a",borderRadius:2}}/></div>
                  </div>);
                })}
                <div className="card" style={{padding:"15px 20px",borderColor:"#c9a227"}}>
                  <div style={{display:"flex",justifyContent:"space-between"}}>
                    <span style={{color:"#777"}}>全部累計淨損益</span>
                    <span className={`mono ${pc(totalRealized)}`} style={{fontSize:19,fontWeight:700}}>{fmtS(totalRealized)}</span>
                  </div>
                </div>
              </>}
          </div>
        )}

        {tab===5&&<EntryRadarTab watchlist={watchlist}/>}
        {tab===6&&<ExitAlertTab trades={trades}/>}
      </div>

      {sellModal&&(
        <div className="modal-bg" onClick={()=>setSellModal(null)}>
          <div className="modal" onClick={e=>e.stopPropagation()}>
            <div style={{fontWeight:700,fontSize:17,marginBottom:2}}>賣出 {sellModal.stock}</div>
            <div style={{fontSize:11,color:"#666",marginBottom:20}}>持有 {fmt(sellModal.shares)} 股 · 買入成本 {fmt(sellModal.buyPrice)}</div>
            <div style={{display:"flex",flexDirection:"column",gap:14}}>
              <div><label className="lbl">賣出日期</label><input className="inp" type="date" value={sellForm.date} onChange={e=>setSellForm({...sellForm,date:e.target.value})}/></div>
              <div>
                <label className="lbl">賣出股數（持有 {fmt(sellModal.shares)} 股）</label>
                <div style={{display:"flex",gap:8,alignItems:"center"}}>
                  <input className="inp" type="number" min="1" max={sellModal.shares} value={sellForm.shares} onChange={e=>setSellForm({...sellForm,shares:e.target.value})}/>
                  <button onClick={()=>setSellForm({...sellForm,shares:String(sellModal.shares)})} style={{background:"none",border:"1px solid #2a2a35",color:"#888",borderRadius:3,padding:"9px 12px",cursor:"pointer",fontSize:12,whiteSpace:"nowrap",fontFamily:"inherit"}}>全部</button>
                </div>
                {sellForm.shares&&parseInt(sellForm.shares)<sellModal.shares&&<div style={{fontSize:11,color:"#c9a227",marginTop:5}}>⚠ 部分賣出，剩餘 {sellModal.shares-parseInt(sellForm.shares)} 股繼續持有</div>}
              </div>
              <div><label className="lbl">賣出價格（每股）</label><input className="inp" type="number" step="0.01" value={sellForm.price} onChange={e=>setSellForm({...sellForm,price:e.target.value})} autoFocus/></div>
              {sellPreview&&sellForm.shares&&(
                <div style={{background:"#0f1015",borderRadius:3,padding:"12px 14px"}}>
                  <div className="fr"><span>賣出股數</span><b>{fmt(parseInt(sellForm.shares)||0)} 股</b></div>
                  <div className="fr"><span>毛損益</span><b className={pc(sellPreview.gross)}>{fmtS(sellPreview.gross)}</b></div>
                  <div className="fr"><span>手續費（買+賣）</span><b>-{fmt(sellPreview.buyFee.broker+sellPreview.sellFee.broker)}</b></div>
                  <div className="fr"><span>證交稅</span><b>-{fmt(sellPreview.sellFee.tax)}</b></div>
                  <hr className="hdiv"/>
                  <div className="fr" style={{fontSize:14}}><span style={{color:"#e8e6de"}}>淨損益</span><b className={pc(sellPreview.net)} style={{fontSize:17}}>{fmtS(sellPreview.net)}</b></div>
                  <div className="fr"><span>報酬率</span><b className={pc(sellPreview.gross)}>{((parseFloat(sellForm.price)-sellModal.buyPrice)/sellModal.buyPrice*100).toFixed(2)}%</b></div>
                </div>
              )}
              <div style={{display:"flex",gap:10}}>
                <button className="btn-gold" onClick={confirmSell}>確認賣出</button>
                <button className="btn-sm" onClick={()=>setSellModal(null)}>取消</button>
              </div>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
